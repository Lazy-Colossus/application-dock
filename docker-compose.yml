services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: application-dock:latest
    container_name: application-dock
    restart: unless-stopped
    ports:
      - "8123:8000"
    environment:
      DATA_DIR: /data
      HOST_SCRIPTS_DIR_ON_HOST: ${HOST_SCRIPTS_DIR:-/home/jake/scripts}
    volumes:
      - archery-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_SCRIPTS_DIR:-/scripts}:/host-scripts:ro

volumes:
  archery-data:
