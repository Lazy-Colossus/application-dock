<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Accent Color Options</title>
<style>
  @import url('data:text/css,');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #141414;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #F0F0F0;
    padding: 40px;
    min-height: 100vh;
  }
  h1 {
    font-size: 14px;
    font-weight: 500;
    color: #888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .grid {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  .col {
    flex: 1;
    background: #242424;
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .swatch {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .hex {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #A0A0A0;
    letter-spacing: 0.05em;
  }
  .label {
    font-size: 15px;
    font-weight: 600;
    color: #F0F0F0;
    letter-spacing: 0.02em;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: #333;
    margin: 4px 0;
  }
  .preview {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .preview-label {
    font-size: 10px;
    color: #666;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .btn-confirm {
    width: 100%;
    height: 44px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    color: #141414;
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .shot-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn-shot {
    width: 64px;
    height: 64px;
    border: none;
    border-radius: 8px;
    font-family: 'Roboto Mono', 'Courier New', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #141414;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .target-icon {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<h1>Accent Color Options — Dark App</h1>
<div class="grid">

  <!-- Option 1: Goldenrod -->
  <div class="col">
    <div class="swatch" style="background:#C8960A;"></div>
    <div class="hex">#C8960A</div>
    <div class="label">Goldenrod</div>
    <div class="divider"></div>
    <div class="preview">
      <div class="preview-label">Preview</div>
      <button class="btn-confirm" style="background:#C8960A;">Confirm Target</button>
      <div class="shot-row">
        <button class="btn-shot" style="background:#C8960A;">11</button>
        <svg class="target-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="28" cy="28" r="26" stroke="#3A3A3A" stroke-width="2"/>
          <circle cx="28" cy="28" r="18" stroke="#3A3A3A" stroke-width="2"/>
          <circle cx="28" cy="28" r="10" fill="#3A3A3A"/>
          <circle cx="28" cy="28" r="26" stroke="#2A7A3A" stroke-width="2" stroke-dasharray="0" opacity="0.6"/>
          <circle cx="28" cy="28" r="18" stroke="#2A9A44" stroke-width="2"/>
          <circle cx="28" cy="28" r="10" fill="#2DBD55"/>
          <path d="M22 28 L26 32 L34 24" stroke="#141414" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

          <circle cx="28" cy="28" r="18" stroke="#2A9A44" stroke-width="2"/>

          <path d="M22 28 L26 32 L34 24" stroke="#141414" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

    </div>
  </div>

          <circle cx="28" cy="28" r="18" stroke="#2A9A44" stroke-width="2"/>
          <circle cx="28" cy="28" r="10" fill="#2DBD55"/>
          <path d="M22 28 L26 32 L34 24" stroke="#141414" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

    </div>
  </div>

</div>
</body>
</html>
