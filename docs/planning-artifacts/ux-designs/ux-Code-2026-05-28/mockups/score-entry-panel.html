<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score Entry Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0A0A;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 32px 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  .phone {
    width: 375px;
    min-height: 812px;
    background: #141414;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
  }
  .app-bar {
    height: 56px;
    background: #1E1E1E;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px 0 4px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .app-bar-title {
    color: #F0F0F0;
    font-weight: 700;
    font-size: 18px;
    flex: 1;
    text-align: center;
    margin: 0 8px;
  }
  .icon-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .subtitle-bar {
    background: #141414;
    padding: 8px 16px;
    text-align: center;
    color: #8A8A8A;
    font-size: 13px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  /* Simplified board behind */
  .board-bg {
    flex: 1;
    padding: 16px;
    position: relative;
    z-index: 1;
  }
  .target-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .target-cell {
    height: 56px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Roboto Mono', 'Courier New', monospace;
    font-weight: 700;
    font-size: 18px;
  }
  .target-confirmed { background: #2E7D32; color: #A5D6A7; }
  .target-pending { background: #242424; border: 1px solid #2A2A2A; color: #8A8A8A; }
  /* Overlay */
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(20, 20, 20, 0.60);
    z-index: 10;
  }
  /* Bottom sheet */
  .bottom-sheet {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 75%;
    background: #1E1E1E;
    border-radius: 16px 16px 0 0;
    z-index: 20;
    padding: 12px 24px 32px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .drag-handle {
    width: 32px;
    height: 4px;
    background: #2A2A2A;
    border-radius: 2px;
    margin: 0 auto 16px;
    flex-shrink: 0;
  }
  .sheet-title {
    color: #F0F0F0;
    font-weight: 700;
    font-size: 20px;
    text-align: center;
    margin-bottom: 14px;
    flex-shrink: 0;
  }
  .archer-chips-row {
    display: flex;
    flex-direction: row;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .chip-done {
    background: #242424;
    border-radius: 8px;
    height: 30px;
    padding: 0 10px;
    display: flex;
    align-items: center;
    color: #8A8A8A;
    font-size: 12px;
    border: 1px solid transparent;
  }
  .chip-active {
    background: #242424;
    border-radius: 8px;
    height: 30px;
    padding: 0 10px;
    display: flex;
    align-items: center;
    color: #F0F0F0;
    font-size: 12px;
    border: 1px solid #C8960A;
  }
  .archer-name-label {
    color: #F0F0F0;
    font-size: 16px;
    font-weight: 500;
    text-align: center;
    margin-bottom: 2px;
    flex-shrink: 0;
  }
  .archer-sub-label {
    color: #8A8A8A;
    font-size: 12px;
    text-align: center;
    margin-bottom: 14px;
    flex-shrink: 0;
  }
  .shot-slots {
    display: flex;
    flex-direction: row;
    gap: 12px;
    justify-content: center;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .shot-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1.5px solid #4A4A4A;
    background: transparent;
  }
  .back-link {
    color: #8A8A8A;
    font-size: 13px;
    text-align: center;
    margin-bottom: 12px;
    flex-shrink: 0;
  }
  .shot-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    margin-bottom: 16px;
  }
  .shot-row {
    display: flex;
    flex-direction: row;
    gap: 8px;
  }
  .score-btn {
    flex: 1;
    height: 64px;
    border: none;
    border-radius: 8px;
    font-family: 'Roboto Mono', 'Courier New', monospace;
    font-weight: 700;
    font-size: 24px;
    cursor: pointer;
  }
  .score-btn-raised {
    background: #1E1E1E;
    color: #F0F0F0;
    border: 1px solid #2A2A2A;
  }
  .score-btn-accent {
    background: #C8960A;
    color: #F0F0F0;
  }
  .score-btn-card {
    background: #242424;
    color: #F0F0F0;
  }
  .confirm-btn {
    width: 100%;
    height: 56px;
    border: none;
    border-radius: 8px;
    background: #242424;
    color: #4A4A4A;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="app-bar">
    <div class="icon-btn">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="14,4 6,11 14,18" stroke="#8A8A8A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <span class="app-bar-title">Scoring</span>
    <div class="icon-btn">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 2L2 9V20H8V14H14V20H20V9L11 2Z" stroke="#8A8A8A" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>
  <div class="subtitle-bar">7 of 18 confirmed</div>
  <!-- Simplified scoring board visible behind -->
  <div class="board-bg">
    <div class="target-grid">
      <div class="target-cell target-confirmed">1</div>
      <div class="target-cell target-confirmed">2</div>
      <div class="target-cell target-confirmed">3</div>
      <div class="target-cell target-confirmed">4</div>
      <div class="target-cell target-confirmed">5</div>
      <div class="target-cell target-confirmed">6</div>
      <div class="target-cell target-confirmed">7</div>
      <div class="target-cell target-pending">8</div>
      <div class="target-cell target-pending">9</div>
      <div class="target-cell target-pending">10</div>
      <div class="target-cell target-pending">11</div>
      <div class="target-cell target-pending">12</div>
      <div class="target-cell target-pending">13</div>
      <div class="target-cell target-pending">14</div>
      <div class="target-cell target-pending">15</div>
      <div class="target-cell target-pending">16</div>
      <div class="target-cell target-pending">17</div>
      <div class="target-cell target-pending">18</div>
    </div>
  </div>
  <!-- Dim overlay -->
  <div class="overlay"></div>
  <!-- Bottom sheet -->
  <div class="bottom-sheet">
    <div class="drag-handle"></div>
    <div class="sheet-title">Target 7</div>
    <div class="archer-chips-row">
      <div class="chip-done">Alice &#10003;</div>
      <div class="chip-done">Ben &#10003;</div>
      <div class="chip-active">Jamie</div>
    </div>
    <div class="archer-name-label">Jamie</div>
    <div class="archer-sub-label">Shot 1 of 2</div>
    <div class="shot-slots">
      <div class="shot-circle"></div>
      <div class="shot-circle"></div>
    </div>
    <div class="back-link">Back</div>
    <div class="shot-grid">
      <div class="shot-row">
        <button class="score-btn score-btn-raised">10</button>
        <button class="score-btn score-btn-accent">11</button>
      </div>
      <div class="shot-row">
        <button class="score-btn score-btn-card">0</button>
        <button class="score-btn score-btn-card">5</button>
        <button class="score-btn score-btn-card">8</button>
      </div>
    </div>
    <button class="confirm-btn">Confirm Target</button>
  </div>
</div>
</body>
</html>
