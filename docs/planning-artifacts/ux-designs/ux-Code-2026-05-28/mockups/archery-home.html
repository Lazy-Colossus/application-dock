<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archery Home</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0A0A;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 32px 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  .phone {
    width: 375px;
    min-height: 812px;
    background: #141414;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 24px 80px rgba(0,0,0,0.8);
  }
  .app-bar {
    height: 56px;
    background: #1E1E1E;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px 0 4px;
  }
  .app-bar-title {
    color: #F0F0F0;
    font-weight: 700;
    font-size: 18px;
    flex: 1;
    text-align: center;
    margin: 0 8px;
  }
  .icon-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .body {
    padding: 16px;
    position: relative;
    z-index: 1;
  }
  .btn-primary {
    width: 100%;
    height: 56px;
    background: #C8960A;
    border: none;
    border-radius: 8px;
    color: #F0F0F0;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .section-label {
    color: #8A8A8A;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 20px;
    margin-bottom: 8px;
  }
  .history-row {
    background: #242424;
    border-radius: 8px;
    height: 72px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .history-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .history-date {
    color: #F0F0F0;
    font-size: 14px;
    font-weight: 500;
  }
  .history-meta {
    color: #8A8A8A;
    font-size: 12px;
  }
  /* Dim overlay */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(20, 20, 20, 0.70);
    z-index: 10;
  }
  /* Bottom sheet */
  .bottom-sheet {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1E1E1E;
    border-radius: 16px 16px 0 0;
    z-index: 20;
    padding: 12px 24px 40px;
  }
  .drag-handle {
    width: 32px;
    height: 4px;
    background: #2A2A2A;
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-label {
    color: #8A8A8A;
    font-size: 12px;
    text-align: center;
    margin-bottom: 16px;
  }
  .btn-accent {
    width: 100%;
    height: 56px;
    background: #C8960A;
    border: none;
    border-radius: 8px;
    color: #F0F0F0;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .btn-secondary {
    width: 100%;
    height: 56px;
    background: transparent;
    border: 1.5px solid #2A2A2A;
    border-radius: 8px;
    color: #F0F0F0;
    font-size: 16px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="app-bar">
    <div class="icon-btn">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="14,4 6,11 14,18" stroke="#8A8A8A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <span class="app-bar-title">Archery</span>
    <div class="icon-btn">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 2L2 9V20H8V14H14V20H20V9L11 2Z" stroke="#8A8A8A" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>
  <div class="body">
    <button class="btn-primary">New Session</button>
    <div class="section-label">History</div>
    <div class="history-row">
      <div class="history-left">
        <span class="history-date">2026-05-28</span>
        <span class="history-meta">3 archers · Jamie won · 284 pts</span>
      </div>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="6,3 12,9 6,15" stroke="#4A4A4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="history-row">
      <div class="history-left">
        <span class="history-date">2026-05-21</span>
        <span class="history-meta">2 archers · Alice won · 215 pts</span>
      </div>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="6,3 12,9 6,15" stroke="#4A4A4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="history-row">
      <div class="history-left">
        <span class="history-date">2026-05-14</span>
        <span class="history-meta">4 archers · Ben won · 301 pts</span>
      </div>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="6,3 12,9 6,15" stroke="#4A4A4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>
  <!-- Dim overlay -->
  <div class="overlay"></div>
  <!-- Bottom sheet -->
  <div class="bottom-sheet">
    <div class="drag-handle"></div>
    <div class="sheet-label">Session in progress</div>
    <button class="btn-accent">Resume</button>
    <button class="btn-secondary">Start Fresh</button>
  </div>
</div>
</body>
</html>
