<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoring Board</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0A0A;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 32px 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  .phone {
    width: 375px;
    min-height: 812px;
    background: #141414;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
  }
  .app-bar {
    height: 56px;
    background: #1E1E1E;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px 0 4px;
    flex-shrink: 0;
  }
  .app-bar-title {
    color: #F0F0F0;
    font-weight: 700;
    font-size: 18px;
    flex: 1;
    text-align: center;
    margin: 0 8px;
  }
  .icon-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .subtitle-bar {
    background: #141414;
    padding: 8px 16px;
    text-align: center;
    color: #8A8A8A;
    font-size: 13px;
    flex-shrink: 0;
  }
  .body {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .target-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0;
  }
  .target-cell {
    height: 56px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Roboto Mono', 'Courier New', monospace;
    font-weight: 700;
    font-size: 18px;
  }
  .target-confirmed {
    background: #2E7D32;
    color: #A5D6A7;
  }
  .target-pending {
    background: #242424;
    border: 1px solid #2A2A2A;
    color: #8A8A8A;
  }
  .archer-chips {
    display: flex;
    flex-direction: row;
    gap: 8px;
    padding: 16px 0 0;
    flex-wrap: wrap;
  }
  .chip {
    background: #242424;
    border-radius: 8px;
    height: 32px;
    padding: 0 8px;
    display: flex;
    align-items: center;
    color: #8A8A8A;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="app-bar">
    <div class="icon-btn">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="14,4 6,11 14,18" stroke="#8A8A8A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <span class="app-bar-title">Scoring</span>
    <div class="icon-btn">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 2L2 9V20H8V14H14V20H20V9L11 2Z" stroke="#8A8A8A" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>
  <div class="subtitle-bar">7 of 18 confirmed</div>
  <div class="body">
    <div class="target-grid">
      <!-- Confirmed targets 1-7 -->
      <div class="target-cell target-confirmed">1</div>
      <div class="target-cell target-confirmed">2</div>
      <div class="target-cell target-confirmed">3</div>
      <div class="target-cell target-confirmed">4</div>
      <div class="target-cell target-confirmed">5</div>
      <div class="target-cell target-confirmed">6</div>
      <div class="target-cell target-confirmed">7</div>
      <!-- Pending targets 8-18 -->
      <div class="target-cell target-pending">8</div>
      <div class="target-cell target-pending">9</div>
      <div class="target-cell target-pending">10</div>
      <div class="target-cell target-pending">11</div>
      <div class="target-cell target-pending">12</div>
      <div class="target-cell target-pending">13</div>
      <div class="target-cell target-pending">14</div>
      <div class="target-cell target-pending">15</div>
      <div class="target-cell target-pending">16</div>
      <div class="target-cell target-pending">17</div>
      <div class="target-cell target-pending">18</div>
    </div>
    <div class="archer-chips">
      <div class="chip">Alice</div>
      <div class="chip">Ben</div>
      <div class="chip">Jamie</div>
    </div>
  </div>
</div>
</body>
</html>
