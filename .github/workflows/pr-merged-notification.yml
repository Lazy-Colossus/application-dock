name: PR Merged Notification

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    # A "closed" PR is not necessarily merged — only notify on actual merges.
    if: github.event.pull_request.merged == true

    steps:
      - name: Google Chat Notification
        run: |
          curl --location --request POST '${{ secrets.GCHAT_WEBHOOK }}' \
          --header 'Content-Type: application/json' \
          --data-raw '{
              "cardsV2": [
                  {
                      "cardId": "pr-merged-${{ github.event.pull_request.number }}",
                      "card": {
                          "header": {
                              "title": "PR Merged to main",
                              "subtitle": "PR #${{ github.event.pull_request.number }}"
                          },
                          "sections": [
                              {
                                  "widgets": [
                                      {
                                          "decoratedText": {
                                              "topLabel": "Title",
                                              "text": "${{ github.event.pull_request.title }}"
                                          }
                                      },
                                      {
                                          "decoratedText": {
                                              "topLabel": "Merged by",
                                              "text": "${{ github.event.pull_request.merged_by.login }}"
                                          }
                                      },
                                      {
                                          "decoratedText": {
                                              "topLabel": "Author",
                                              "text": "${{ github.event.pull_request.user.login }}"
                                          }
                                      },
                                      {
                                          "decoratedText": {
                                              "topLabel": "Branch",
                                              "text": "${{ github.event.pull_request.head.ref }} -> ${{ github.event.pull_request.base.ref }}"
                                          }
                                      },
                                      {
                                          "buttonList": {
                                              "buttons": [
                                                  {
                                                      "text": "OPEN PR",
                                                      "onClick": {
                                                          "openLink": {
                                                              "url": "${{ github.event.pull_request.html_url }}"
                                                          }
                                                      }
                                                  }
                                              ]
                                          }
                                      }
                                  ]
                              }
                          ]
                      }
                  }
              ]
          }'
